apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-logs-analyzer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-logs-analyzer
  template:
    metadata:
      labels:
        app: ai-logs-analyzer
    spec:
      containers:
      - name: ai-logs-analyzer
        image: bsiddardha/ai-logs-analyzer:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: groq-secret
              key: GROQ_API_KEY
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 40
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          failureThreshold: 5